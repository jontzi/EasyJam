apiVersion: v1
kind: Namespace
metadata:
  name: easyjam
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: easyjam-data
  namespace: easyjam
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: easyjam-env
  namespace: easyjam
type: Opaque
stringData:
  SPOTIFY_CLIENT_ID: "replace-me"
  SPOTIFY_CLIENT_SECRET: "replace-me"
  ADMIN_ACCESS_KEY: "replace-me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: easyjam-config
  namespace: easyjam
data:
  PORT: "5050"
  DATABASE_PATH: "/data/easyjam.sqlite"
  FRONTEND_URL: "https://easyjam.example.com"
  SPOTIFY_REDIRECT_URI: "https://easyjam.example.com/api/auth/callback"
  AUTO_START_PLAYBACK: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: easyjam
  namespace: easyjam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: easyjam
  template:
    metadata:
      labels:
        app: easyjam
    spec:
      containers:
        - name: easyjam
          image: easyjam:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          envFrom:
            - configMapRef:
                name: easyjam-config
            - secretRef:
                name: easyjam-env
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: easyjam-data
---
apiVersion: v1
kind: Service
metadata:
  name: easyjam
  namespace: easyjam
spec:
  type: NodePort
  selector:
    app: easyjam
  ports:
    - name: http
      port: 5050
      targetPort: 5050
      nodePort: 30050
